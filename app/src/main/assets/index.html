<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PWM GEN</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');

:root {
  --bg:      #040408;
  --border:  #1a2540;
  --yellow:  #ffc300;
  --blue:    #00aaff;
  --green:   #00ff88;
  --orange:  #ff6600;
  --cyan:    #00ffee;
  --dim:     #2a3550;
  --sb:      44px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }

body {
  background: var(--bg);
  color: var(--yellow);
  font-family: 'Share Tech Mono', monospace;
  height: 100dvh;
  display: flex;
  flex-direction: row;
  overflow: hidden;
  user-select: none;
}

/* ═══ SIDEBAR ═══ */
.sidebar {
  width: var(--sb);
  min-width: var(--sb);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 4px 0;
  gap: 4px;
  background: #060810;
  border-right: 1px solid var(--border);
  z-index: 10;
}

.sb-btn {
  width: 38px;
  height: 38px;
  border: 1px solid var(--dim);
  border-radius: 5px;
  background: #0a0f1a;
  color: var(--yellow);
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  line-height: 1.2;
  text-align: center;
}
.sb-btn span { font-size: 10px; font-weight: bold; }
.sb-btn sub  { font-size: 8px; color: var(--dim); }
.sb-btn.active {
  border-color: var(--blue);
  background: #001a33;
  color: var(--blue);
  box-shadow: 0 0 8px #00aaff44;
}
.sb-btn.active sub { color: var(--blue); }
.sb-sep { width: 28px; height: 1px; background: var(--border); margin: 1px 0; }

/* ═══ MAIN ═══ */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

/* ═══ SCOPE ═══ */
.scope-wrap { flex: 1; position: relative; overflow: hidden; }
canvas#scope { position: absolute; inset: 0; width: 100%; height: 100%; }

/* ═══ FREQ/DUTY BAR (top overlay) ═══ */
.top-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  display: flex;
  align-items: center;
  gap: 3px;
  padding: 3px 6px;
  background: linear-gradient(to bottom, #060810ee, transparent);
  z-index: 5;
}
.top-label { font-size: 10px; color: var(--dim); letter-spacing: 1px; min-width: 16px; }
.top-digits { display: flex; gap: 2px; }
.top-digit {
  width: 18px; height: 24px;
  border: 1px solid var(--dim);
  border-radius: 3px;
  background: #0a0f1a;
  color: var(--yellow);
  font-family: 'Orbitron', monospace;
  font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.top-digit.active { border-color: var(--blue); color: var(--blue); background: #001a33; }
.top-unit { font-size: 10px; color: var(--dim); margin-left: 2px; }

/* Duty bar top right */
.duty-top {
  position: absolute;
  top: 3px; right: 6px;
  display: flex;
  align-items: center;
  gap: 4px;
  z-index: 6;
}
.duty-top-val {
  font-family: 'Orbitron', monospace;
  font-size: 16px;
  color: var(--blue);
  min-width: 36px;
  text-align: right;
}
.duty-top-unit { font-size: 10px; color: var(--dim); }

/* ═══ DIGIT POPUP ═══ */
.digit-popup {
  position: fixed; z-index: 100;
  background: #0d1525;
  border: 1px solid var(--blue);
  border-radius: 8px;
  padding: 10px 8px;
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  box-shadow: 0 0 20px #00aaff44;
}
.digit-popup.show { display: flex; }
.dp-val { font-family: 'Orbitron', monospace; font-size: 22px; color: var(--blue); min-width: 16px; text-align: center; }
.dp-btn {
  width: 40px; height: 34px;
  border: 1px solid var(--border);
  border-radius: 5px;
  background: #0a0f1a;
  color: var(--blue);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

/* ═══ CONTROLS ═══ */
.ctrl { background: #060810; border-top: 1px solid var(--border); padding: 5px 8px; }

.slider-row {
  display: flex; align-items: center; gap: 5px; margin-bottom: 4px;
}
.sl-name { font-size: 10px; color: var(--dim); width: 28px; }
.sl-val {
  font-family: 'Orbitron', monospace;
  font-size: 15px;
  min-width: 52px; text-align: right;
}
.sl-unit { font-size: 9px; color: var(--dim); width: 20px; }

input[type=range] {
  flex: 1; -webkit-appearance: none;
  height: 6px; background: #1a2540; border-radius: 3px; outline: none;
  touch-action: pan-x;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--yellow); cursor: pointer;
  border: 2px solid var(--bg);
  box-shadow: 0 0 6px var(--yellow);
}
input[type=range].blue::-webkit-slider-thumb { background: var(--blue); box-shadow: 0 0 6px var(--blue); }
input[type=range].cyan::-webkit-slider-thumb { background: var(--cyan); box-shadow: 0 0 6px var(--cyan); }

.step-row { display: flex; gap: 3px; margin-bottom: 2px; }
.step-label { font-size: 9px; color: var(--dim); width: 28px; line-height: 22px; }
.step-btn {
  flex: 1; height: 22px;
  border: 1px solid var(--border); border-radius: 3px;
  background: #0a0f1a; color: var(--dim);
  font-family: 'Share Tech Mono', monospace; font-size: 9px; cursor: pointer;
}
.step-btn.active { border-color: var(--yellow); color: var(--yellow); background: #1a1400; }
.step-btn.active-blue { border-color: var(--blue); color: var(--blue); background: #001a33; }

/* ═══ STATUS ═══ */
.status-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 2px 8px; background: #040408;
  border-top: 1px solid var(--border); font-size: 9px;
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: #ff3333; display: inline-block; margin-right: 4px; }
.status-dot.on { background: var(--green); box-shadow: 0 0 4px var(--green); }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sb-btn active" id="btn-ch12" onclick="selectMode('ch12')">
    <span>CH</span><sub>1/2</sub>
  </div>
  <div class="sb-btn" id="btn-duty" onclick="selectMode('duty')">
    <span style="font-size:14px">%</span><sub>1/2</sub>
  </div>
  <div class="sb-sep"></div>
  <div class="sb-btn" id="btn-ch3" onclick="onCh3Tap()">
    <span>CH</span><sub id="ch3-sub">3</sub>
  </div>
  <div class="sb-btn" id="btn-d3" onclick="selectMode('d3')">
    <span style="font-size:14px">%</span><sub>ch3</sub>
  </div>
  <div class="sb-sep"></div>
  <div class="sb-btn" id="btn-ch3p" onclick="selectMode('ch3p')">
    <span>⋮⋮</span><sub>PH</sub>
  </div>
  <div class="sb-sep"></div>
  <div class="sb-btn" id="btn-pll" onclick="togglePLL()" title="ФАПЧ">
    <span style="font-size:9px">ФАП</span><sub id="pll-sub">ЧЧ</sub>
  </div>
  <div class="sb-btn" id="btn-inv" onclick="toggleINV()" title="Инверсия сигналов">
    <span style="font-size:9px">INV</span><sub id="inv-sub">OFF</sub>
  </div>
  <div class="sb-btn" id="btn-zoom" onclick="toggleZoom()" title="CH3 на весь экран">
    <span style="font-size:14px">⛶</span><sub>CH3</sub>
  </div>
  <div style="flex:1"></div>
  <div class="sb-btn" onclick="connectUSB()" oncontextmenu="showConnMenu(); return false;" ontouchstart="startLongPress(event)" ontouchend="cancelLongPress()" ontouchmove="cancelLongPress()" style="font-size:8px;">
    <span id="conn-icon">USB</span><sub id="conn-sub">OFF</sub>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- SCOPE -->
  <div class="scope-wrap" id="scope-wrap">
    <canvas id="scope"></canvas>

    <!-- Top bar: freq/duty digits -->
    <div class="top-bar" id="top-bar">
      <span class="top-label" id="top-label">F:</span>
      <div class="top-digits" id="top-digits"></div>
      <span class="top-unit" id="top-unit">Hz</span>
    </div>

    <!-- Duty value top right (shown in duty mode) -->
    <div class="duty-top" id="duty-top" style="display:none">
      <span class="duty-top-val" id="duty-top-val">50</span>
      <span class="duty-top-unit">%</span>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="ctrl" id="ctrl-panel">

    <!-- CH1/CH2 freq -->
    <div id="panel-ch12">
      <div class="slider-row">
        <span class="sl-name" style="color:var(--yellow)">FREQ</span>
        <input type="range" id="sl-freq" min="100" max="500000" value="20000"
               oninput="onFreqSlider(this.value)">
        <span class="sl-val" id="sv-freq" style="color:var(--yellow)">20000</span>
        <span class="sl-unit">Hz</span>
      </div>
    </div>

    <!-- CH1/CH2 duty -->
    <div id="panel-duty" style="display:none">
      <div class="slider-row">
        <span class="sl-name" style="color:var(--blue)">DUTY</span>
        <input type="range" id="sl-duty" min="1" max="49" value="50" class="blue"
               oninput="onDutySlider(this.value)">
        <span class="sl-val" id="sv-duty" style="color:var(--blue)">50</span>
        <span class="sl-unit">%</span>
      </div>
    </div>

    <!-- CH3 freq -->
    <div id="panel-ch3" style="display:none">
      <div class="slider-row">
        <span class="sl-name" style="color:var(--cyan)">F3</span>
        <input type="range" id="sl-f3" min="500000" max="10000000" value="1000000" class="cyan"
               oninput="onF3Slider(this.value)">
        <span class="sl-val" id="sv-f3" style="color:var(--cyan)">1M</span>
        <span class="sl-unit">Hz</span>
      </div>
    </div>

    <!-- CH3 duty -->
    <div id="panel-d3" style="display:none">
      <div class="slider-row">
        <span class="sl-name" style="color:var(--cyan)">D3</span>
        <input type="range" id="sl-d3" min="1" max="99" value="50" class="cyan"
               oninput="onD3Slider(this.value)">
        <span class="sl-val" id="sv-d3" style="color:var(--cyan)">50</span>
        <span class="sl-unit">%</span>
      </div>
    </div>

    <!-- CH3 phase/count -->
    <div id="panel-ch3p" style="display:none">
      <div class="slider-row" onclick="setCh3pActive('ph')" style="cursor:pointer">
        <span class="sl-name" id="lbl-ph" style="color:var(--cyan)">PHS</span>
        <input type="range" id="sl-ph" min="0" max="999" value="0" class="cyan"
               oninput="onPhSlider(this.value)">
        <span class="sl-val" id="sv-ph" style="color:var(--cyan)">0</span>
        <span class="sl-unit">%</span>
      </div>
      <div class="slider-row" onclick="setCh3pActive('n3')" style="cursor:pointer">
        <span class="sl-name" id="lbl-n3" style="color:var(--dim)">CNT</span>
        <input type="range" id="sl-n3" min="1" max="10" value="5" class="cyan"
               oninput="onN3Slider(this.value)" style="pointer-events:none; opacity:0.4">
        <span class="sl-val" id="sv-n3" style="color:var(--dim)">5</span>
        <span class="sl-unit">шт</span>
      </div>
    </div>

  </div>

  <!-- STATUS -->
  <div class="status-bar">
    <div><span class="status-dot" id="sdot"></span><span id="stxt">OFFLINE</span></div>
    <div style="color:var(--dim);font-size:8px" id="ssum"></div>
  </div>
</div>

<!-- Digit popup -->
<div class="digit-popup" id="dpop">
  <div class="dp-btn" onclick="digitChg(1)">▲</div>
  <div class="dp-val" id="dpval">0</div>
  <div class="dp-btn" onclick="digitChg(-1)">▼</div>
</div>

<script>
// ─── State ───
const S = { freq:20000, duty:50, f3:1000000, d3:50, n3:5, ph:0 };
const steps = { freq:10, duty:1, f3:100000, d3:1, ph:1, n3:1 };
let currentMode = 'ch12';
let activeDigitIdx = -1;
let connected = false;

// ─── Mode ───
function selectMode(m) {
  currentMode = m;
  ['ch12','duty','ch3','d3','ch3p'].forEach(id => {
    const el = document.getElementById('panel-'+id);
    if (el) el.style.display = 'none';
  });
  ['ch12','duty','ch3','d3','ch3p'].forEach(id => {
    const b = document.getElementById('btn-'+id);
    if (b) b.classList.remove('active');
  });
  const panel = document.getElementById('panel-'+m);
  if (panel) panel.style.display = 'block';
  const btn = document.getElementById('btn-'+m);
  if (btn) btn.classList.add('active');

  // Update top bar
  const labels = {ch12:'F:', duty:'D:', ch3:'F3:', d3:'D3:', ch3p:'PH:'};
  const units  = {ch12:'Hz', duty:'%', ch3:'Hz', d3:'%', ch3p:'%'};
  const vals   = {ch12:S.freq, duty:S.duty, ch3:S.f3, d3:S.d3, ch3p:S.ph};
  document.getElementById('top-label').textContent = labels[m] || '';
  document.getElementById('top-unit').textContent = units[m] || '';

  // Show duty top right only in duty/d3 mode
  const dutyTop = document.getElementById('duty-top');
  if (m === 'duty') {
    dutyTop.style.display = 'flex';
    document.getElementById('duty-top-val').textContent = S.duty;
  } else if (m === 'd3') {
    dutyTop.style.display = 'flex';
    document.getElementById('duty-top-val').textContent = S.d3;
  } else {
    dutyTop.style.display = 'none';
  }

  buildDigits(vals[m] || 0, units[m]);
  drawScope();
}

// ─── Top digits ───
function buildDigits(val, unit) {
  const isPct = unit === '%';
  const s = isPct ? String(val).padStart(2,'0') : String(val).padStart(7,'0');
  const cont = document.getElementById('top-digits');
  cont.innerHTML = '';
  for (let i = 0; i < s.length; i++) {
    const d = document.createElement('div');
    d.className = 'top-digit' + (i === activeDigitIdx ? ' active' : '');
    d.textContent = s[i];
    d.dataset.idx = i;
    d.onclick = () => openDigitPopup(i, s.length, unit);
    cont.appendChild(d);
  }
}

function getCurVal() {
  const map = {ch12:S.freq, duty:S.duty, ch3:S.f3, d3:S.d3, ch3p:S.ph};
  return map[currentMode] || 0;
}

function setCurVal(v) {
  const limits = {
    ch12:[100,500000], duty:[1,99], ch3:[500000,10000000], d3:[1,99], ch3p:[0,99]
  };
  const [mn,mx] = limits[currentMode] || [0,999999];
  v = Math.max(mn, Math.min(mx, v));

  if (currentMode === 'ch12') {
    S.freq = v;
    document.getElementById('sl-freq').value = v;
    document.getElementById('sv-freq').textContent = v;
    sendRaw('F1:'+v+'\n');
  } else if (currentMode === 'duty') {
    S.duty = v;
    document.getElementById('sl-duty').value = v;
    document.getElementById('sv-duty').textContent = v;
    document.getElementById('duty-top-val').textContent = v;
    sendRaw('D1:'+v+'\n');
  } else if (currentMode === 'ch3') {
    S.f3 = v;
    document.getElementById('sl-f3').value = v;
    document.getElementById('sv-f3').textContent = fmtHz(v);
    sendRaw('F3:'+v+'\n');
  } else if (currentMode === 'd3') {
    S.d3 = v;
    document.getElementById('sl-d3').value = v;
    document.getElementById('sv-d3').textContent = v;
    document.getElementById('duty-top-val').textContent = v;
    sendRaw('D3:'+v+'\n');
  } else if (currentMode === 'ch3p') {
    S.ph = v;
    document.getElementById('sl-ph').value = v;
    document.getElementById('sv-ph').textContent = v;
    sendRaw('P3:'+v+'\n');
  }
  const units = {ch12:'Hz', duty:'%', ch3:'Hz', d3:'%', ch3p:'%'};
  buildDigits(v, units[currentMode]);
  updateSum();
  drawScope();
}

function openDigitPopup(idx, len, unit) {
  activeDigitIdx = idx;
  buildDigits(getCurVal(), unit);
  const pop = document.getElementById('dpop');
  const digits = document.getElementById('top-digits');
  const d = digits.children[idx];
  const r = d.getBoundingClientRect();
  pop.style.left = Math.min(r.left - 5, window.innerWidth - 70) + 'px';
  pop.style.top = (r.bottom + 6) + 'px';
  document.getElementById('dpval').textContent = d.textContent;
  pop.classList.add('show');
  setTimeout(() => document.addEventListener('click', closePopup, {once:true}), 100);
}

function closePopup(e) {
  if (!document.getElementById('dpop').contains(e.target)) {
    document.getElementById('dpop').classList.remove('show');
    activeDigitIdx = -1;
    const units = {ch12:'Hz', duty:'%', ch3:'Hz', d3:'%', ch3p:'%'};
    buildDigits(getCurVal(), units[currentMode]);
  }
}

function digitChg(dir) {
  if (activeDigitIdx < 0) return;
  const units = {ch12:'Hz', duty:'%', ch3:'Hz', d3:'%', ch3p:'%'};
  const unit = units[currentMode];
  const isPct = unit === '%';
  const s = isPct ? String(getCurVal()).padStart(2,'0') : String(getCurVal()).padStart(7,'0');
  const place = Math.pow(10, s.length - 1 - activeDigitIdx);
  setCurVal(getCurVal() + dir * place);
  const newS = isPct ? String(getCurVal()).padStart(2,'0') : String(getCurVal()).padStart(7,'0');
  document.getElementById('dpval').textContent = newS[activeDigitIdx] || '0';
}

// ─── Throttle отправки команд ───
const throttleLast = {};
const throttleTimer = {};
function throttleSend(key, cmd, interval) {
  throttleLast[key] = cmd;
  if (!throttleTimer[key]) {
    throttleTimer[key] = setInterval(() => {
      if (throttleLast[key]) {
        sendRaw(throttleLast[key]);
        throttleLast[key] = null;
      } else {
        clearInterval(throttleTimer[key]);
        throttleTimer[key] = null;
      }
    }, interval || 40);
  }
}

function onFreqSlider(v) {
  S.freq = parseInt(v);
  document.getElementById('sv-freq').textContent = S.freq;
  buildDigits(S.freq, 'Hz');
  throttleSend('freq', 'F1:'+S.freq+'\n', 40);
  updateSum(); drawScope();
}
function onDutySlider(v) {
  S.duty = parseInt(v);
  document.getElementById('sv-duty').textContent = S.duty;
  document.getElementById('duty-top-val').textContent = S.duty;
  buildDigits(S.duty, '%');
  throttleSend('duty', 'D1:'+S.duty+'\n', 40);
  updateSum(); drawScope();
}
function onF3Slider(v) {
  S.f3 = parseInt(v);
  document.getElementById('sv-f3').textContent = fmtHz(S.f3);
  buildDigits(S.f3, 'Hz');
  throttleSend('f3', 'F3:'+S.f3+'\n', 40);
  updateSum(); drawScope();
}
function onD3Slider(v) {
  S.d3 = parseInt(v);
  document.getElementById('sv-d3').textContent = S.d3;
  document.getElementById('duty-top-val').textContent = S.d3;
  buildDigits(S.d3, '%');
  throttleSend('d3', 'D3:'+S.d3+'\n', 40);
  updateSum(); drawScope();
}
function onPhSlider(v) {
  S.ph = parseInt(v);
  document.getElementById('sv-ph').textContent = S.ph;
  throttleSend('ph', 'P3:'+S.ph+'\n', 40);
  updateSum(); drawScope();
}
function onN3Slider(v) {
  S.n3 = parseInt(v);
  document.getElementById('sv-n3').textContent = S.n3;
  throttleSend('n3', 'N3:'+S.n3+'\n', 40);
  updateSum(); drawScope();
}

let sliderActive = false;
let sliderDebounce = null;

// Глобальное отслеживание касания ползунков
document.addEventListener('touchstart', e => {
  if (e.target && e.target.type === 'range') sliderActive = true;
}, {passive:true});
document.addEventListener('touchend', e => {
  if (e.target && e.target.type === 'range') {
    setTimeout(() => { sliderActive = false; }, 1500);
  }
}, {passive:true});

function addSliderSend(id, cmdFn) {
  const el = document.getElementById(id);
  el.addEventListener('touchend', () => {
    if (sliderDebounce) clearTimeout(sliderDebounce);
    sliderDebounce = setTimeout(() => cmdFn(), 100);
  });
  el.addEventListener('mouseup', () => cmdFn());
}

let ch3pActive = 'ph';
let x2Active = false;
let ch3LastTap = 0;
let pllActive = false;
let invActive = false;

function toggleINV() {
  invActive = !invActive;
  sendRaw('IV:'+(invActive?1:0)+'\n');
  const btn = document.getElementById('btn-inv');
  btn.classList.toggle('active', invActive);
  document.getElementById('inv-sub').textContent = invActive ? 'ON' : 'OFF';
}

function togglePLL() {
  pllActive = !pllActive;
  sendRaw('PL:'+(pllActive?1:0)+'\n');
  const btn = document.getElementById('btn-pll');
  btn.classList.toggle('active', pllActive);
  document.getElementById('pll-sub').textContent = pllActive ? 'ON' : 'ЧЧ';
}

function onCh3Tap() {
  const now = Date.now();
  if (now - ch3LastTap < 500) {
    // Двойное нажатие — X2
    x2Active = !x2Active;
    sendRaw('X2:'+(x2Active?1:0)+'\n');
    const btn = document.getElementById('btn-ch3');
    btn.style.borderColor = x2Active ? 'var(--yellow)' : '';
    btn.style.boxShadow = x2Active ? '0 0 10px var(--yellow)' : '';
    document.getElementById('ch3-sub').textContent = x2Active ? '×2' : '3';
    drawScope();
  } else {
    // Одиночное — переключаем режим
    selectMode('ch3');
  }
  ch3LastTap = now;
} // активный параметр: 'ph' или 'n3'

function setCh3pActive(param) {
  ch3pActive = param;
  // PHS
  document.getElementById('lbl-ph').style.color = param === 'ph' ? 'var(--cyan)' : 'var(--dim)';
  document.getElementById('sv-ph').style.color = param === 'ph' ? 'var(--cyan)' : 'var(--dim)';
  document.getElementById('sl-ph').style.pointerEvents = param === 'ph' ? 'auto' : 'none';
  document.getElementById('sl-ph').style.opacity = param === 'ph' ? '1' : '0.4';
  // CNT
  document.getElementById('lbl-n3').style.color = param === 'n3' ? 'var(--cyan)' : 'var(--dim)';
  document.getElementById('sv-n3').style.color = param === 'n3' ? 'var(--cyan)' : 'var(--dim)';
  document.getElementById('sl-n3').style.pointerEvents = param === 'n3' ? 'auto' : 'none';
  document.getElementById('sl-n3').style.opacity = param === 'n3' ? '1' : '0.4';
}

function snapToStep(v, step) { return Math.round(v / step) * step; }

function setStep(param, val, btn) {
  steps[param] = val;
  btn.parentElement.querySelectorAll('.step-btn').forEach(b => {
    b.classList.remove('active','active-blue');
  });
  btn.classList.add(param === 'duty' || param === 'd3' ? 'active-blue' : 'active');
}

function fmtHz(v) {
  if (v >= 1000000) return (v/1000000).toFixed(1)+'M';
  if (v >= 1000) return (v/1000).toFixed(0)+'k';
  return v;
}

function updateSum() {
  document.getElementById('ssum').textContent =
    'CH1/2: '+fmtHz(S.freq)+'Hz D:'+S.duty+'% | CH3: '+fmtHz(S.f3)+'Hz D:'+S.d3+'% ×'+S.n3+' φ'+S.ph+'%';
}

// ─── Oscilloscope ───
let phGesture = false, phStartX = 0, phStartVal = 0;

let zoomCH3 = false;
let timeScale = 1.0;
let viewStart = 0;      // начало видимого окна в "единицах периода CH3"
let pinchStartDist = 0;
let pinchStartScale = 1.0;
let pinchStartView = 0;
let pinchCenterNorm = 0.5;
let panStartX = 0;
let panStartView = 0;
let isPanning = false;

function toggleZoom() {
  zoomCH3 = !zoomCH3;
  viewStart = 0;
  document.getElementById('btn-zoom').classList.toggle('active', zoomCH3);
  drawScope();
}

function initGesture() {
  const wrap = document.getElementById('scope-wrap');

  wrap.addEventListener('touchmove', e => {
    if (e.touches.length >= 2) e.preventDefault();
  }, {passive: false});

  wrap.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      isPanning = false;
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      pinchStartDist = Math.sqrt(dx*dx + dy*dy);
      pinchStartScale = timeScale;
      pinchStartView = viewStart;
      pinchCenterNorm = (e.touches[0].clientX + e.touches[1].clientX) / 2 / wrap.offsetWidth;
    } else if (e.touches.length === 1) {
      if (zoomCH3) {
        isPanning = true;
        panStartX = e.touches[0].clientX;
        panStartView = viewStart;
      } else {
        const y = e.touches[0].clientY;
        const h = wrap.offsetHeight;
        if (y > h * 0.67) {
          phGesture = true;
          phStartX = e.touches[0].clientX;
          phStartVal = S.ph;
        }
      }
    }
  }, {passive:true});

  wrap.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const newScale = Math.max(0.01, Math.min(500, pinchStartScale * dist / pinchStartDist));
      // viewStart в долях ширины экрана
      // точка под центром: worldPos = viewStart + pinchCenterNorm
      // после zoom она должна остаться на том же месте экрана
      const worldCenter = pinchStartView + pinchCenterNorm;
      viewStart = worldCenter - pinchCenterNorm;
      timeScale = newScale;
      drawScope();
    } else if (e.touches.length === 1) {
      if (isPanning && zoomCH3) {
        const dx = e.touches[0].clientX - panStartX;
        const W = wrap.offsetWidth;
        viewStart = panStartView - dx / W;
        drawScope();
      } else if (phGesture) {
        const dx = e.touches[0].clientX - phStartX;
        const W = wrap.offsetWidth;
        const phDelta = Math.round(dx / W * 999);
        S.ph = ((phStartVal + phDelta) % 1000 + 1000) % 1000;
        document.getElementById('sl-ph').value = S.ph;
        document.getElementById('sv-ph').textContent = S.ph;
        drawScope();
      }
    }
  }, {passive:true});

  wrap.addEventListener('touchend', e => {
    if (e.touches.length === 0) {
      if (phGesture) { sendRaw('P3:'+S.ph+'\n'); phGesture = false; }
      isPanning = false;
    }
  });
}

function drawScope() {
  const canvas = document.getElementById('scope');
  const wrap = document.getElementById('scope-wrap');
  const W = wrap.offsetWidth * devicePixelRatio;
  const H = wrap.offsetHeight * devicePixelRatio;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // BG
  ctx.fillStyle = '#020208'; ctx.fillRect(0,0,W,H);

  // Grid
  const gx = 10, gy = 6;
  ctx.strokeStyle = '#0a1020'; ctx.lineWidth = 1;
  for (let i=0; i<=gx; i++) { const x=i*W/gx; ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let i=0; i<=gy; i++) { const y=i*H/gy; ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  const rowH = H / 3;
  const pad = rowH * 0.1;
  const hi = pad;
  const lo = rowH - pad;

  // ─── Draw PWM wave ───
  // phaseShift: 0 = нет сдвига, 0.5 = противофаза
  function drawPWM(yTop, duty, color, cycles, phaseShift) {
    const cw = W / cycles;
    const phOff = (phaseShift || 0) * cw;
    ctx.strokeStyle = color; ctx.lineWidth = 2 * devicePixelRatio;
    ctx.shadowColor = color; ctx.shadowBlur = 3 * devicePixelRatio;
    ctx.beginPath();
    const hiW = cw * duty / 100;
    for (let i = -1; i < cycles + 1; i++) {
      const x0 = i * cw + phOff;
      ctx.moveTo(x0, yTop + lo);
      ctx.lineTo(x0, yTop + hi);
      ctx.lineTo(x0 + hiW, yTop + hi);
      ctx.lineTo(x0 + hiW, yTop + lo);
      ctx.lineTo(x0 + cw, yTop + lo);
    }
    ctx.stroke(); ctx.shadowBlur = 0;
  }

  // ─── Draw burst (CH3) ───
  function drawBurst(yTop, duty3, color, count, phase, cycles) {
    const cw = W / cycles;
    // Фаза — сдвиг пачки вправо (0-99% от периода CH1)
    const phOff = phase / 1000 * cw;

    ctx.strokeStyle = color; ctx.lineWidth = 2 * devicePixelRatio;
    ctx.shadowColor = color; ctx.shadowBlur = 3 * devicePixelRatio;
    ctx.beginPath();

    const freqRatio = S.f3 / S.freq;
    const impW = Math.max(2, cw / freqRatio);
    const hiW3 = impW * duty3 / 100;

    // Первый импульс первой пачки на экране
    // Пачки повторяются каждые cw пикселей (период CH1)
    // Внутри каждой пачки count импульсов через impW
    const firstBurst = phOff % cw - cw; // начало первой пачки левее экрана
    
    for (let i = 0; i * cw + firstBurst < W + cw * 2; i++) {
      const bStart = firstBurst + i * cw;
      for (let j = 0; j < count; j++) {
        const ix = bStart + j * impW;
        if (ix + hiW3 > 0 && ix < W) {
          ctx.moveTo(Math.max(0, ix), yTop + lo);
          ctx.lineTo(Math.max(0, ix), yTop + hi);
          ctx.lineTo(Math.min(W, ix + hiW3), yTop + hi);
          ctx.lineTo(Math.min(W, ix + hiW3), yTop + lo);
        }
      }
    }
    // Базовая линия
    ctx.moveTo(0, yTop + lo); ctx.lineTo(W, yTop + lo);
    ctx.stroke(); ctx.shadowBlur = 0;
  }

  // Временное окно фиксировано, количество периодов зависит от частоты
  // timeScale=1 → окно = 5 периодов при 20кГц (базовая частота)
  // При увеличении частоты → больше периодов в том же окне (уже импульсы)
  // При pinch zoom → меняем окно
  const baseFreq = 20000;
  const baseCycles = 5;
  const windowTime = baseCycles / baseFreq / timeScale; // секунд
  const cycles = Math.max(0.5, windowTime * S.freq); // периодов CH1 в окне

  ctx.save(); ctx.rect(0,0,W,H); ctx.clip();

  if (zoomCH3) {
    // Режим зума CH3 — на весь экран
    // Амплитуда на четверть меньше — занимает 75% высоты
    const pad2 = H * 0.15;  // отступ сверху и снизу (15% каждый = 30% всего)
    const hi2 = pad2;
    const lo2 = H - pad2;

    // Временное окно для CH3 — отдельный масштаб на основе f3
    const windowTime3 = baseCycles / baseFreq / timeScale;
    const cycles3 = Math.max(0.5, windowTime3 * S.f3);
    const cw3 = W / cycles3;
    const phOff3 = S.ph / 1000 * cw3;
    const impW3 = cw3;
    const hiW3 = impW3 * S.d3 / 100;

    ctx.strokeStyle = '#00aaff'; ctx.lineWidth = 2.5 * devicePixelRatio;
    ctx.shadowColor = '#00aaff'; ctx.shadowBlur = 5 * devicePixelRatio;
    ctx.beginPath();

    // Рисуем пачки — каждый период CH1 содержит N3 импульсов CH3
    const ch1CycleW = W / Math.max(0.5, windowTime3 * S.freq);
    const offsetPx = viewStart * W;

    function drawZoomBursts(color, phaseOffset) {
      ctx.strokeStyle = color;
      ctx.beginPath();
      const extraPhOff = phaseOffset * ch1CycleW;
      for (let i = -3; i < cycles3 * (S.f3 / S.freq) + 4; i++) {
        const burstStart = i * ch1CycleW + phOff3 + extraPhOff - offsetPx;
        for (let j = 0; j < S.n3; j++) {
          const ix = burstStart + j * cw3;
          if (ix > -cw3 && ix < W + cw3) {
            ctx.moveTo(ix, lo2);
            ctx.lineTo(ix, hi2);
            ctx.lineTo(ix + hiW3, hi2);
            ctx.lineTo(ix + hiW3, lo2);
          }
        }
      }
      ctx.moveTo(0, lo2); ctx.lineTo(W, lo2);
      ctx.stroke();
    }

    ctx.lineWidth = 2.5 * devicePixelRatio;
    ctx.shadowBlur = 5 * devicePixelRatio;
    ctx.shadowColor = '#00aaff';
    drawZoomBursts('#00aaff', 0);
    if (x2Active) {
      ctx.shadowColor = '#aa44ff';
      drawZoomBursts('#aa44ff', 0.5);
    }
    ctx.shadowBlur = 0;

    // Метка
    ctx.fillStyle = '#00aaff';
    ctx.font = (11*devicePixelRatio)+'px Share Tech Mono';
    ctx.fillText('CH3 | '+fmtHz(S.f3)+'Hz D:'+S.d3+'% ×'+S.n3+' φ'+S.ph+'%',
      4*devicePixelRatio, 14*devicePixelRatio);
  } else {
    // Обычный режим — 3 канала
    drawPWM(0,      S.duty, '#00ff88', cycles, 0);
    drawPWM(rowH,   S.duty, '#ff6600', cycles, 0.5);
    // CH3 пачки — если X2 то вторая пачка со сдвигом 50% периода CH1
    drawBurst(rowH*2, S.d3, '#00aaff', S.n3, S.ph, cycles);
    if (x2Active) {
      // Вторая пачка сдвинута на 50% периода CH1 (в фазу CH2)
      const ph2 = (S.ph + 500) % 1000;
      drawBurst(rowH*2, S.d3, '#aa44ff', S.n3, ph2, cycles);
    }
  }

  ctx.restore();

  // Индикатор развёртки
  const periodMs = 1000 / S.freq;
  const windowMs = periodMs * cycles;
  ctx.fillStyle = '#2a3550';
  ctx.font = (8*devicePixelRatio)+'px Share Tech Mono';
  const tbTxt = windowMs >= 1 ? windowMs.toFixed(1)+'ms/div' : (windowMs*1000).toFixed(0)+'us/div';
  ctx.fillText(tbTxt, W - 60*devicePixelRatio, H - 4*devicePixelRatio);
  [
    ['CH1 '+fmtHz(S.freq)+'Hz D:'+S.duty+'%', '#00ff88', 0],
    ['CH2 '+fmtHz(S.freq)+'Hz D:'+S.duty+'%', '#ff6600', rowH],
    ['CH3 '+fmtHz(S.f3)+'Hz ×'+S.n3+' D:'+S.d3+'% φ'+S.ph+'%', '#00aaff', rowH*2]
  ].forEach(([txt, col, y]) => {
    ctx.fillStyle = col+'99'; ctx.fillRect(0, y, W, 1);
    ctx.fillStyle = col;
    ctx.fillText(txt, 4*devicePixelRatio, y + 12*devicePixelRatio);
  });
}

// ─── USB ───
window.onUsbEvent = function(event) {
  if (event === 'connected') {
    connected = true;
    document.getElementById('sdot').classList.add('on');
    document.getElementById('stxt').textContent = 'ONLINE';
    document.getElementById('conn-sub').textContent = 'ON';
    const mode = (typeof AndroidUSB !== 'undefined') ? AndroidUSB.getMode() : 'usb';
    document.getElementById('conn-icon').textContent = mode === 'wifi' ? 'WiFi' : 'USB';
    setTimeout(() => sendRaw('GET\n'), 500);
    setTimeout(() => sendRaw('GET\n'), 1500);
    if (window._si) clearInterval(window._si);
    window._si = setInterval(() => { if (connected) sendRaw('GET\n'); }, 2000);
  } else if (event === 'disconnected') {
    connected = false;
    if (window._si) clearInterval(window._si);
    document.getElementById('sdot').classList.remove('on');
    document.getElementById('stxt').textContent = 'OFFLINE';
    document.getElementById('conn-sub').textContent = 'OFF';
  } else if (event.startsWith('data:')) {
    try {
      const d = JSON.parse(event.substring(5).trim());
      if (d.f1 !== undefined) {
        // Обновляем только если ползунок не активен
        if (!sliderActive) {
          S.freq=d.f1; S.duty=d.d1; S.f3=d.f3; S.d3=d.d3; S.n3=d.n3; S.ph=d.p3;
          document.getElementById('sl-freq').value = S.freq;
          document.getElementById('sl-duty').value = S.duty;
          document.getElementById('sl-f3').value = S.f3;
          document.getElementById('sl-d3').value = S.d3;
          document.getElementById('sl-ph').value = S.ph;
          document.getElementById('sl-n3').value = S.n3;
          document.getElementById('sv-freq').textContent = S.freq;
          document.getElementById('sv-duty').textContent = S.duty;
          document.getElementById('sv-f3').textContent = fmtHz(S.f3);
          document.getElementById('sv-d3').textContent = S.d3;
          document.getElementById('sv-ph').textContent = S.ph;
          document.getElementById('sv-n3').textContent = S.n3;
          document.getElementById('duty-top-val').textContent =
            currentMode === 'd3' ? S.d3 : S.duty;
          const units = {ch12:'Hz', duty:'%', ch3:'Hz', d3:'%', ch3p:'%'};
          const vals = {ch12:S.freq, duty:S.duty, ch3:S.f3, d3:S.d3, ch3p:S.ph};
          buildDigits(vals[currentMode]||0, units[currentMode]||'');
          updateSum(); drawScope();
        }
        if (d.x2 !== undefined && d.x2 !== (x2Active?1:0)) {
          x2Active = d.x2 === 1;
          const btn = document.getElementById('btn-ch3');
          btn.style.borderColor = x2Active ? 'var(--yellow)' : '';
          btn.style.boxShadow = x2Active ? '0 0 10px var(--yellow)' : '';
          btn.querySelector('sub').textContent = x2Active ? '×2' : '3';
        }
        if (d.pl !== undefined) {
          pllActive = d.pl === 1;
          document.getElementById('btn-pll').classList.toggle('active', pllActive);
          document.getElementById('pll-sub').textContent = pllActive ? 'ON' : 'ЧЧ';
        }
        if (d.iv !== undefined) {
          invActive = d.iv === 1;
          document.getElementById('btn-inv').classList.toggle('active', invActive);
          document.getElementById('inv-sub').textContent = invActive ? 'ON' : 'OFF';
        }
      }
    } catch(e) {}
  }
};

function connectUSB() {
  if (typeof AndroidUSB !== 'undefined') {
    const r = AndroidUSB.connect();
    if (r === 'NO_DEVICE') document.getElementById('stxt').textContent = 'НЕТ УСТРОЙСТВА';
  }
}

let longPressTimer = null;
function startLongPress(e) {
  longPressTimer = setTimeout(() => { showConnMenu(); }, 700);
}
function cancelLongPress() {
  if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
}
function showConnMenu() {
  if (typeof AndroidUSB !== 'undefined') AndroidUSB.showConnectionMenu();
}

function sendRaw(s) {
  if (typeof AndroidUSB !== 'undefined') AndroidUSB.send(s);
}

// ─── Init ───
window.addEventListener('load', () => {
  selectMode('ch12');
  updateSum();
  initGesture();

  const ro = new ResizeObserver(() => drawScope());
  ro.observe(document.getElementById('scope-wrap'));
  drawScope();
  setTimeout(() => drawScope(), 300);
  setTimeout(() => drawScope(), 800);
});
</script>
